<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Journey</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#050816;
display:flex;
justify-content:center;
align-items:center;
color:white;
position:relative;
}

/* Animated Background */

.stars{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.star{
position:absolute;
color:white;
opacity:.6;
animation:float linear infinite;
}

@keyframes float{

from{
transform:translateY(100vh);
}

to{
transform:translateY(-100px);
}

}

/* Main Card */

.card{

width:90%;
max-width:800px;

padding:50px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.1);

border-radius:30px;

text-align:center;

z-index:10;
}

.logo{

font-size:60px;
margin-bottom:15px;
}

h1{

font-size:3rem;
margin-bottom:15px;
}

.typewriter{

font-size:1.2rem;
line-height:1.8;
color:#d1d5db;

min-height:100px;
margin-bottom:30px;
}

/* Button */

.btn{

padding:16px 40px;

border:none;

border-radius:50px;

cursor:pointer;

font-size:18px;

background:linear-gradient(
45deg,
#8b5cf6,
#ec4899
);

color:white;

transition:.3s;
}

.btn:hover{

transform:scale(1.08);
}

/* Bottom Text */

.footer{

margin-top:25px;
font-size:14px;
opacity:.7;
}

/* Mobile */

@media(max-width:768px){

h1{
font-size:2rem;
}

.card{
padding:30px;
}

.typewriter{

font-size:1.2rem;
line-height:1.8;
color:#d1d5db;

min-height:100px;
margin-bottom:30px;

visibility:visible;
font-size:1rem;
}

}
.navbar{

position:fixed;

top:20px;
left:50%;

transform:translateX(-50%);

width:95%;
max-width:1200px;

display:flex;

justify-content:space-between;

align-items:center;

padding:15px 25px;

z-index:1000;
}

.logo{

font-size:24px;

font-weight:700;

color:white;

text-shadow:
0 0 10px rgba(236,72,153,.6);
}

.nav-container{

display:flex;

gap:10px;

padding:10px;

border-radius:50px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.1);

box-shadow:
0 8px 30px rgba(0,0,0,.3);
}

.nav-container a{

text-decoration:none;

color:white;

padding:12px 18px;

border-radius:30px;

font-size:15px;

transition:.4s;
}

.nav-container a:hover{

transform:translateY(-3px);

background:rgba(255,255,255,.12);

box-shadow:
0 0 20px rgba(139,92,246,.5);
}

.active{

background:linear-gradient(
45deg,
#8b5cf6,
#ec4899
);

box-shadow:
0 0 20px rgba(236,72,153,.6);
}

@media(max-width:900px){

.navbar{

flex-direction:column;

gap:15px;
}

.nav-container{

flex-wrap:wrap;

justify-content:center;
align-self: center;
}

}
/* Password Modal */

.modal{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.95);

display:flex;

justify-content:center;

align-items:center;

z-index:9999;
}

.modal-box{

width:90%;
max-width:400px;

padding:35px;

text-align:center;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:25px;

border:1px solid rgba(255,255,255,.1);
}

.modal-box h2{

margin-bottom:15px;
}

.modal-box p{

margin-bottom:20px;

color:#cbd5e1;
}

.modal-box input{

width:100%;

padding:15px;

border:none;

outline:none;

border-radius:12px;

margin-bottom:15px;

font-size:16px;
}

.modal-box button{

width:100%;

padding:15px;

border:none;

cursor:pointer;

border-radius:12px;

font-size:16px;

color:white;

background:linear-gradient(
45deg,
#8b5cf6,
#ec4899
);
}

#error{

margin-top:10px;

color:#ff6b6b;

font-size:14px;
}
.modal{

opacity:1;

transition:
opacity 0.8s ease,
transform 0.8s ease;
}
.modal-box{

animation:popup 0.8s ease;
}

@keyframes popup{

from{

opacity:0;
transform:scale(.9);
}

to{

opacity:1;
transform:scale(1);
}

}
.music-btn{
position:fixed;
bottom:20px;
right:20px;
padding:12px 18px;
border:none;
border-radius:50px;
cursor:pointer;
background:linear-gradient(45deg,#8b5cf6,#ec4899);
color:white;
font-size:14px;
z-index:9999;
box-shadow:0 0 15px rgba(0,0,0,.3);
}

</style>

</head>

<body>
    <audio id="bgmusic" loop>
  <source src="bg.mp3" type="audio/mpeg">
</audio>
    <nav class="navbar">
<div class="logo">
    ✨ Memory Journey
</div>

<div class="nav-container">

    <a href="index.html" class="active">🏠 Home</a>

    <a href="timeline.html">
        📖 Timeline
    </a>

    <a href="gallery.html">
        📸 Gallery
    </a>

    <a href="memories.html">
        💌 Stories
    </a>

    <a href="surprise.html">
        🎁 Surprise
    </a>

</div>

</nav>
    <!-- Password Modal -->

<div id="passwordModal" class="modal">

    <div class="modal-box">

        <h2>🔐 Secret Access</h2>

        <p>
            Enter the special password to unlock the journey.
        </p>

        <input
        type="password"
        id="passwordInput"
        placeholder="Enter Password"
        autocomplete="new-password"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false">
  

        <button onclick="checkPassword()">
            Unlock
        </button>

        <p id="error"></p>

    </div>

</div>


<div class="stars" id="stars"></div>

<div class="card">

<div class="logo">✨</div>

<h1>Memory Journey</h1>

<div class="typewriter" id="text"></div>

<button class="btn" onclick="startJourney()">

Begin The Journey ❤️

</button>

<div class="footer">

Every memory tells a story...

</div>

</div>
<script>
const message = "Welcome to a special place where moments become memories and memories become timeless stories. Today, you will relive a journey filled with happiness, laughter, surprises, and unforgettable moments.";

let i = 0;
let typingStarted = false;

function typeWriter() {
  const el = document.getElementById("text");

  if (!typingStarted) {
    typingStarted = true;
    el.innerHTML = "";
  }

  if (i < message.length) {
    el.innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 80);
  }
}

/* Start automatically */
window.addEventListener("load", () => {
  i = 0;
  typingStarted = false;
  typeWriter();
});
</script>
<script>
    window.onload = function(){

    const pass =
    document.getElementById("passwordInput");

    pass.value = "";

    pass.setAttribute("value","");

};

const PASSWORD = "2026";

function checkPassword(){
    
    const input =
    document.getElementById("passwordInput").value;

if(input === PASSWORD){

    const modal = document.getElementById("passwordModal");

    modal.style.transition = "all 0.8s ease";
    modal.style.opacity = "0";
    modal.style.backdropFilter = "blur(0px)";

setTimeout(() => {

    modal.style.display = "none";



}, 800);

    document.getElementById("text").innerHTML = "";
    i = 0;

    typeWriter();

}
    else{

        document.getElementById("error")
        .innerText = "❌ Incorrect Password";

    }

}

/* Enter Key Support */

document
.getElementById("passwordInput")
.addEventListener("keypress",function(e){

    if(e.key === "Enter"){

        checkPassword();

    }

});
window.addEventListener("load", () => {

    document.getElementById("passwordInput").value = "";

});
window.addEventListener("pageshow", () => {

    document.getElementById("passwordInput").value = "";

});
</script>
<script>
const music = document.getElementById("bgmusic");

// restore time if exists
const savedTime = localStorage.getItem("musicTime");
if (savedTime) {
  music.currentTime = parseFloat(savedTime);
}

// try autoplay (starts after first click)
window.addEventListener("click", () => {
  music.play();
}, { once: true });

// save progress continuously
setInterval(() => {
  if (!music.paused) {
    localStorage.setItem("musicTime", music.currentTime);
  }
}, 1000);
</script>
<button id="musicBtn" class="music-btn">🔊 Music On</button>

<script>
const audio = document.getElementById("bgmusic");
const btn = document.getElementById("musicBtn");

// ensure correct initial state
function updateButton() {
  if (audio.paused) {
    btn.innerHTML = "🔇 Music Off";
  } else {
    btn.innerHTML = "🔊 Music On";
  }
}

// click toggle
btn.addEventListener("click", async () => {
  if (audio.paused) {
    try {
      await audio.play();
    } catch (err) {
      console.log("Play blocked:", err);
    }
  } else {
    audio.pause();
  }

  updateButton();
});

// set correct state on load
window.addEventListener("load", () => {
  updateButton();
});
</script>
</body>






</html>
